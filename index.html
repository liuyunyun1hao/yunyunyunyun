<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>硅基流动 API 密钥批量管理工具 (移动适配版)</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body { 
            font-family: "Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",Arial,sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 10px; /* 缩小移动端外边距 */
        }
        
        #app { 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .header-card { 
            margin-bottom: 20px; 
            border-radius: 8px; /* 圆角边框更美观 */
        }

        /* 统计卡片样式优化 */
        .stat-card { 
            text-align: center; 
            padding: 15px 10px; 
            background: #f8f9fa; 
            border: 1px solid #ebeef5;
            border-radius: 6px; 
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .stat-card:hover {
            box-shadow: 0 2px 12px 0 rgba(0,0,0,.1);
        }
        .stat-value { 
            font-size: 24px; 
            font-weight: bold; 
            color: #409EFF; 
            margin-top: 8px; 
        }

        /* 解决重叠的核心：允许换行并设置固定间隙 */
        .action-bar { 
            margin-bottom: 15px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: space-between; 
            align-items: center; 
        }
        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* 移动端输入框宽度 100% */
        .secret-input {
            width: 250px;
        }

        .mask-text { 
            -webkit-text-security: disc; 
        }

        /* 移动端媒体查询调整 */
        @media screen and (max-width: 768px) {
            .secret-input {
                width: 100%; /* 手机端密钥输入框占满整行 */
            }
            .el-button {
                margin-left: 0 !important; /* 覆盖默认的左边距，依赖 gap 排版 */
            }
            .el-message-box {
                width: 90% !important; /* 手机端确认弹窗宽度适配 */
            }
        }
    </style>
</head>
<body>

<div id="app">
    <el-card class="header-card" shadow="hover">
        <div slot="header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <span style="font-size: 18px; font-weight: bold;">硅基流动 API 密钥批量管理</span>
            <el-tag type="success" size="small">专业本地版</el-tag>
        </div>
        
        <el-row :gutter="15">
            <el-col :xs="24" :sm="8">
                <div class="stat-card">
                    <div style="font-size: 14px; color: #606266;">总密钥数</div>
                    <div class="stat-value">{{ apiKeys.length }}</div>
                </div>
            </el-col>
            <el-col :xs="24" :sm="8">
                <div class="stat-card">
                    <div style="font-size: 14px; color: #606266;">有效密钥</div>
                    <div class="stat-value" style="color: #67C23A;">{{ validCount }}</div>
                </div>
            </el-col>
            <el-col :xs="24" :sm="8">
                <div class="stat-card">
                    <div style="font-size: 14px; color: #606266;">总余额</div>
                    <div class="stat-value" style="color: #E6A23C;">¥ {{ totalBalance.toFixed(4) }}</div>
                </div>
            </el-col>
        </el-row>

        <div class="action-bar">
            <div class="action-group">
                <el-button type="primary" size="small" icon="el-icon-plus" @click="dialogVisible = true">批量添加</el-button>
                <el-button type="success" size="small" icon="el-icon-refresh" @click="checkAllBalances" :loading="checkingAll">一键测活</el-button>
                <el-button type="danger" size="small" icon="el-icon-delete" @click="clearAll">清空</el-button>
            </div>
            
            <div class="action-group" style="flex-grow: 1; justify-content: flex-end;">
                <el-input size="small" placeholder="XOR全局加密密钥" v-model="secretKey" show-password class="secret-input" @change="saveToLocal">
                    <template slot="prepend"><i class="el-icon-lock"></i></template>
                </el-input>
                <el-button size="small" icon="el-icon-upload2" @click="importJson">导入</el-button>
                <el-button size="small" icon="el-icon-download" @click="exportJson">导出</el-button>
            </div>
        </div>

        <div style="margin-bottom: 10px;">
            <el-switch v-model="showKey" active-text="显示完整 Key" inactive-text="隐藏"></el-switch>
        </div>

        <el-table :data="apiKeys" border style="width: 100%; border-radius: 4px;" max-height="500" v-loading="checkingAll">
            <el-table-column type="index" label="#" width="50" align="center"></el-table-column>
            <el-table-column label="API Key" min-width="220">
                <template slot-scope="scope">
                    <span :class="{'mask-text': !showKey}">{{ scope.row.key }}</span>
                </template>
            </el-table-column>
            <el-table-column prop="status" label="状态" width="100" align="center">
                <template slot-scope="scope">
                    <el-tag v-if="scope.row.status === 'valid'" type="success" size="small">有效</el-tag>
                    <el-tag v-else-if="scope.row.status === 'invalid'" type="danger" size="small">无效</el-tag>
                    <el-tag v-else-if="scope.row.status === 'checking'" type="warning" size="small">查询中</el-tag>
                    <el-tag v-else type="info" size="small">未测</el-tag>
                </template>
            </el-table-column>
            <el-table-column prop="balance" label="余额" width="100" align="center">
                <template slot-scope="scope">
                    <span v-if="scope.row.balance !== null">¥{{ scope.row.balance }}</span>
                    <span v-else>-</span>
                </template>
            </el-table-column>
            <el-table-column label="操作" width="140" align="center" fixed="right">
                <template slot-scope="scope">
                    <el-button size="mini" type="primary" icon="el-icon-refresh-right" circle @click="checkSingleBalance(scope.row)"></el-button>
                    <el-button size="mini" type="danger" icon="el-icon-delete" circle @click="removeKey(scope.$index)"></el-button>
                </template>
            </el-table-column>
        </el-table>
    </el-card>

    <el-dialog title="批量添加 API 密钥" :visible.sync="dialogVisible" width="min(90%, 600px)" top="10vh">
        <el-input
            type="textarea"
            :rows="6"
            placeholder="每行输入一个 API Key&#10;示例：&#10;sk-xxxxxxxxx&#10;sk-yyyyyyyyy"
            v-model="newKeysText">
        </el-input>
        <span slot="footer" class="dialog-footer">
            <el-button size="small" @click="dialogVisible = false">取 消</el-button>
            <el-button size="small" type="primary" @click="addKeys">确认添加</el-button>
        </span>
    </el-dialog>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>

<script>
    new Vue({
        el: '#app',
        data() {
            return {
                secretKey: 'silicon_flow_safe_key', 
                apiKeys: [], 
                dialogVisible: false,
                newKeysText: '',
                checkingAll: false,
                showKey: false
            }
        },
        computed: {
            validCount() {
                return this.apiKeys.filter(k => k.status === 'valid').length;
            },
            totalBalance() {
                return this.apiKeys.reduce((sum, k) => {
                    return sum + (parseFloat(k.balance) || 0);
                }, 0);
            }
        },
        mounted() {
            this.loadFromLocal();
        },
        methods: {
            xorProcess(str, key) {
                if (!key) return str;
                let result = '';
                for (let i = 0; i < str.length; i++) {
                    result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return result;
            },
            encrypt(data) {
                try {
                    const jsonStr = JSON.stringify(data);
                    const xorStr = this.xorProcess(jsonStr, this.secretKey);
                    return btoa(unescape(encodeURIComponent(xorStr)));
                } catch (e) {
                    return '';
                }
            },
            decrypt(base64Str) {
                try {
                    const xorStr = decodeURIComponent(escape(atob(base64Str)));
                    const jsonStr = this.xorProcess(xorStr, this.secretKey);
                    return JSON.parse(jsonStr);
                } catch (e) {
                    return null;
                }
            },
            saveToLocal() {
                if (this.apiKeys.length === 0) {
                    localStorage.removeItem('sf_api_keys');
                    return;
                }
                const encryptedData = this.encrypt(this.apiKeys);
                localStorage.setItem('sf_api_keys', encryptedData);
            },
            loadFromLocal() {
                const data = localStorage.getItem('sf_api_keys');
                if (data) {
                    const decrypted = this.decrypt(data);
                    if (decrypted && Array.isArray(decrypted)) {
                        this.apiKeys = decrypted;
                    } else {
                        this.$message.warning('本地数据解密失败，可能是安全密钥被更改。');
                    }
                }
            },
            addKeys() {
                const keys = this.newKeysText.split('\n').map(k => k.trim()).filter(k => k);
                if (keys.length === 0) {
                    this.$message.warning('请输入有效的密钥');
                    return;
                }
                
                let added = 0;
                keys.forEach(key => {
                    if (!this.apiKeys.find(k => k.key === key)) {
                        this.apiKeys.push({
                            key: key,
                            status: 'unknown',
                            balance: null
                        });
                        added++;
                    }
                });
                
                this.saveToLocal();
                this.dialogVisible = false;
                this.newKeysText = '';
                this.$message.success(`成功添加 ${added} 个新密钥`);
            },
            removeKey(index) {
                this.apiKeys.splice(index, 1);
                this.saveToLocal();
            },
            clearAll() {
                this.$confirm('此操作将清空所有本地存储的密钥, 是否继续?', '安全提示', {
                    confirmButtonText: '确定清空',
                    cancelButtonText: '取消',
                    type: 'warning'
                }).then(() => {
                    this.apiKeys = [];
                    this.saveToLocal();
                    this.$message.success('数据已全部清空');
                }).catch(() => {});
            },
            async checkSingleBalance(row) {
                row.status = 'checking';
                try {
                    const response = await fetch('https://api.siliconflow.cn/v1/user/info', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${row.key}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        const resData = await response.json();
                        let bal = resData.data?.totalBalance || resData.data?.balance || resData.balance || 0;
                        row.balance = parseFloat(bal).toFixed(4);
                        row.status = 'valid';
                    } else {
                        row.status = 'invalid';
                        row.balance = null;
                    }
                } catch (error) {
                    console.error('API调用失败', error);
                    row.status = 'invalid';
                    row.balance = null;
                }
                this.saveToLocal();
            },
            async checkAllBalances() {
                if (this.apiKeys.length === 0) {
                    this.$message.warning('请先添加密钥');
                    return;
                }
                this.checkingAll = true;
                for (let i = 0; i < this.apiKeys.length; i++) {
                    await this.checkSingleBalance(this.apiKeys[i]);
                }
                this.checkingAll = false;
                this.$message.success('全部查询完成');
            },
            exportJson() {
                const dataStr = JSON.stringify(this.apiKeys, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `API_Keys_Backup_${new Date().getTime()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            },
            importJson() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = event => {
                        try {
                            const parsed = JSON.parse(event.target.result);
                            if (Array.isArray(parsed)) {
                                this.apiKeys = parsed;
                                this.saveToLocal();
                                this.$message.success('备份恢复成功');
                            } else {
                                this.$message.error('JSON 格式不正确');
                            }
                        } catch (err) {
                            this.$message.error('解析失败，请检查文件');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
        }
    });
</script>
</body>
</html>
